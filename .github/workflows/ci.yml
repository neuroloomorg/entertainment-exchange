name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify checkout
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Ref:        ${{ github.ref }}"
          echo "SHA:        ${{ github.sha }}"
          ls -la
      - name: Smoke OK
        run: echo "✅ smoke pass"